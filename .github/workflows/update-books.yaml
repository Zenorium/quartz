name: Sync Books

on:
  repository_dispatch:
    types: [book-updated]
  workflow_dispatch:

jobs:
  update-books:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Quartz repository
        uses: actions/checkout@v3
        with:
          submodules: true 
          fetch-depth: 0 

      - name: Pull latest book content
        run: |
          cd content/books
          git pull origin main || echo "No updates to pull"

      - name: Commit and Push Updates
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions@github.com"
          git add content/books
          git commit -m "Auto-update books from repo" || echo "No changes to commit"
          git push origin main || echo "No changes to push