name: Sync Books

on:
  repository_dispatch:
    types: [book-updated]
  workflow_dispatch:

jobs:
  update-books:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Quartz repository
        uses: actions/checkout@v4
        with:
          ssh-key: ${{secrets.DEPLOY_KEY}}
          submodules: true 
          fetch-depth: 0 
          ref: 'v4'

      - name: Configure git
        run: |
          git config --local user.email "github-actions@github.com"
          git config --local user.name "GitHub Actions"
      - name: Checkout the latest commit in books submodule
        run: |
          cd content/books
          git checkout main   # Ensure we are on the correct branch
          git pull origin main  # Fetch the latest changes
      - name: Commit and Push Updates
        run: |
          git add content/books
          git diff --cached --quiet || (git commit -m "Update submodule to latest books from main" && git push)